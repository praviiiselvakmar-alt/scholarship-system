<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - AI Scholarship Finder</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#FBE4D8,#DFB6B2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.main-wrapper{
    width:100%;
    max-width:450px;
    padding:20px;
}

.main-form-card{
    background:#FFFFFF;
    padding:45px;
    border-radius:18px;
    box-shadow:0 15px 35px rgba(25,0,25,.1);
    border:1px solid #DFB6B2;
    text-align:center;
}

.logo{
    font-size:28px;
    font-weight:700;
    color:#522B5B;
    margin-bottom:25px;
}

.badge{
    display:inline-block;
    background:#FBE4D8;
    color:#2B124C;
    padding:8px 18px;
    border-radius:30px;
    font-size:13px;
    font-weight:600;
    margin-bottom:18px;
}

h1{
    color:#190019;
    font-size:30px;
    margin-bottom:10px;
}

p{
    color:#854F6C;
    margin-bottom:30px;
    line-height:1.6;
}

.form-group{
    text-align:left;
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#522B5B;
    font-weight:600;
    font-size:14px;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #DFB6B2;
    border-radius:10px;
    font-size:15px;
    transition:.3s;
    outline:none;
}

input:focus{
    border-color:#522B5B;
    box-shadow:0 0 0 3px rgba(82,43,91,.15);
}

.login-btn{
    width:100%;
    border:none;
    padding:15px;
    border-radius:10px;
    background:linear-gradient(135deg,#522B5B,#2B124C);
    color:white;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
    margin-top:10px;
    box-shadow:0 10px 25px rgba(82,43,91,.35);
}

.login-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 15px 30px rgba(82,43,91,.45);
}

.register-link{
    margin-top:25px;
    color:#854F6C;
    font-size:14px;
}

.register-link a{
    color:#522B5B;
    text-decoration:none;
    font-weight:700;
}

.register-link a:hover{
    text-decoration:underline;
}

@media(max-width:500px){

.main-form-card{
    padding:35px 25px;
}

h1{
    font-size:26px;
}

}

</style>

</head>
<body>

<div class="main-wrapper">

<div class="main-form-card">

<div class="logo">
🎓 AI Scholarship Finder
</div>

<div class="badge">
🤖 Secure AI Login
</div>

<h1>Welcome Back</h1>

<p>
Sign in to continue exploring scholarships tailored to your profile.
</p>

<form id="loginForm">

<div class="form-group">
<label>Email Address</label>
<input
type="email"
id="email"
placeholder="name@example.com"
required>
</div>

<div class="form-group">
<label>Password</label>
<input
type="password"
id="password"
placeholder="••••••••"
required>
</div>

<button type="submit" class="login-btn">
Login
</button>

</form>

<div class="register-link">
Don't have an account?
<a href="register.html">Create Account</a>
</div>

</div>

</div>

<script>

document.getElementById('loginForm').addEventListener('submit', async (e)=>{

e.preventDefault();

const email=document.getElementById('email').value;
const password=document.getElementById('password').value;

try{

const response=await fetch('http://localhost:4000/api/auth/login',{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({
email,
password
})

});

const data=await response.json();

if(response.ok){

localStorage.setItem('token',data.token);

alert('Login Successful!');

let currentPath=window.location.href;

let newPath=currentPath.substring(0,currentPath.lastIndexOf("/"))+"/dashboard.html";

window.location.href=newPath;

}else{

alert(data.message || 'Login Failed');

}

}catch(error){

console.error(error);

alert('Cannot connect to the backend server. Please make sure your Node.js server is running.');

}

});

</script>

</body>
</html>
